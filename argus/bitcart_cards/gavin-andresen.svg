<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1000"
     viewBox="0 0 1000 1000">
  <defs>
    <radialGradient id="page" cx="70%" cy="-10%" r="90%">
      <stop offset="0%" stop-color="#1a3aa0" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#02030c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1538"/>
      <stop offset="100%" stop-color="#03050f"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#061235"/>
      <stop offset="50%" stop-color="#3f6cff"/>
      <stop offset="100%" stop-color="#061235"/>
    </linearGradient>
    <linearGradient id="btn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a4fd0"/>
      <stop offset="100%" stop-color="#1b3082"/>
    </linearGradient>
    <radialGradient id="artbg" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#0b1b48"/>
      <stop offset="100%" stop-color="#010410"/>
    </radialGradient>
    <radialGradient id="coin" cx="42%" cy="36%" r="70%">
      <stop offset="0%" stop-color="#bcd3ff"/>
      <stop offset="55%" stop-color="#6e9bff"/>
      <stop offset="100%" stop-color="#1b3082"/>
    </radialGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6e8fd8"/>
      <stop offset="100%" stop-color="#16265e"/>
    </linearGradient>
    <radialGradient id="screen" cx="50%" cy="30%" r="90%">
      <stop offset="0%" stop-color="#04183a"/>
      <stop offset="100%" stop-color="#010410"/>
    </radialGradient>
    <radialGradient id="badge" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#3f6cff"/>
      <stop offset="100%" stop-color="#0a1538"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="artclip">
      <rect x="202" y="178" width="596" height="296" rx="8"/>
    </clipPath>
  </defs>

  <!-- page background -->
  <rect width="1000" height="1000" fill="#02030c"/>
  <rect width="1000" height="1000" fill="url(#page)"/>

  <!-- card frame -->
  <rect x="180" y="50" width="640" height="900" rx="26" fill="url(#panel)"
        stroke="#5a86ff" stroke-width="3" filter="url(#glow)"/>
  <rect x="186" y="56" width="628" height="888" rx="20"
        fill="none" stroke="#2746b8" stroke-width="1.5" opacity="0.8"/>

  <!-- header: signature centered gradient bar -->
  <rect x="202" y="72" width="596" height="92" rx="10"
        fill="url(#bar)" stroke="#5a86ff" stroke-width="1"/>
  <text x="500" y="116" text-anchor="middle"
        font-family="DejaVu Sans, sans-serif" font-weight="bold"
        font-size="38" fill="#ffffff">Gavin Andresen</text>
  <text x="500" y="146" text-anchor="middle"
        font-family="DejaVu Sans, sans-serif" font-size="18"
        letter-spacing="1" fill="#dbe6ff">Core Maintainer · Faucet-Keeper</text>

  <!-- art window -->
  
    <g clip-path="url(#artclip)">
      <rect x="202" y="178" width="596" height="296" fill="#010410"/>
      <rect x="202" y="178" width="596" height="296" fill="url(#artbg)"/>
      
      <rect x="350" y="208" width="150" height="24" rx="6"
            fill="url(#metal)" stroke="#2746b8" stroke-width="1.5"/>
      <rect x="488" y="208" width="26" height="66" rx="6"
            fill="url(#metal)" stroke="#2746b8" stroke-width="1.5"/>
      <path d="M 478 272 h 46 l -8 26 h -30 z"
            fill="url(#metal)" stroke="#5a86ff" stroke-width="2"
            filter="url(#glow)"/>
    <g filter="url(#glow)"><circle cx="494" cy="318" r="13" fill="url(#coin)" stroke="#5a86ff" stroke-width="2"/><text x="494" y="325" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-weight="bold" font-size="17" fill="#010410">₿</text></g><g filter="url(#glow)"><circle cx="500" cy="354" r="15" fill="url(#coin)" stroke="#5a86ff" stroke-width="2"/><text x="500" y="362" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-weight="bold" font-size="20" fill="#010410">₿</text></g><g filter="url(#glow)"><circle cx="506" cy="394" r="17" fill="url(#coin)" stroke="#5a86ff" stroke-width="2"/><text x="506" y="403" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-weight="bold" font-size="22" fill="#010410">₿</text></g><g><circle cx="422" cy="422" r="20" fill="url(#coin)" stroke="#5a86ff" stroke-width="2"/><text x="422" y="433" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-weight="bold" font-size="26" fill="#010410">₿</text></g><g><circle cx="460" cy="430" r="22" fill="url(#coin)" stroke="#5a86ff" stroke-width="2"/><text x="460" y="442" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-weight="bold" font-size="29" fill="#010410">₿</text></g><g><circle cx="500" cy="434" r="24" fill="url(#coin)" stroke="#5a86ff" stroke-width="2"/><text x="500" y="447" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-weight="bold" font-size="31" fill="#010410">₿</text></g><g><circle cx="542" cy="430" r="22" fill="url(#coin)" stroke="#5a86ff" stroke-width="2"/><text x="542" y="442" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-weight="bold" font-size="29" fill="#010410">₿</text></g><g><circle cx="580" cy="422" r="20" fill="url(#coin)" stroke="#5a86ff" stroke-width="2"/><text x="580" y="433" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-weight="bold" font-size="26" fill="#010410">₿</text></g><g><circle cx="442" cy="404" r="19" fill="url(#coin)" stroke="#5a86ff" stroke-width="2"/><text x="442" y="414" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-weight="bold" font-size="25" fill="#010410">₿</text></g><g><circle cx="482" cy="410" r="21" fill="url(#coin)" stroke="#5a86ff" stroke-width="2"/><text x="482" y="422" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-weight="bold" font-size="27" fill="#010410">₿</text></g><g><circle cx="524" cy="410" r="21" fill="url(#coin)" stroke="#5a86ff" stroke-width="2"/><text x="524" y="422" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-weight="bold" font-size="27" fill="#010410">₿</text></g><g><circle cx="562" cy="404" r="19" fill="url(#coin)" stroke="#5a86ff" stroke-width="2"/><text x="562" y="414" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-weight="bold" font-size="25" fill="#010410">₿</text></g><g><circle cx="500" cy="388" r="20" fill="url(#coin)" stroke="#5a86ff" stroke-width="2"/><text x="500" y="399" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-weight="bold" font-size="26" fill="#010410">₿</text></g>
    </g>
    <rect x="202" y="178" width="596" height="296" rx="8" fill="none"
          stroke="#2746b8" stroke-width="2"/>
    

  <!-- type / strength bar -->
  <rect x="202" y="486" width="596" height="34" rx="6"
        fill="url(#btn)" stroke="#5a86ff" stroke-width="1"/>
  <text x="216" y="510" font-family="DejaVu Sans Mono, monospace"
        font-size="18" letter-spacing="2" fill="#dbe6ff">BITCOIN OPS SPECIALIST</text>
  <text x="784" y="510" text-anchor="end"
        font-family="DejaVu Sans Mono, monospace" font-size="18"
        letter-spacing="1" fill="#dbe6ff">STRENGTH 7</text>

  <!-- ability / flavor text box -->
  <rect x="202" y="532" width="596" height="300" rx="8"
        fill="#010410" stroke="#2746b8" stroke-width="1.5"/>
  <text x="500" y="576" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="23" fill="#ffffff">Built the first Bitcoin faucet and</text>
<text x="500" y="609" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="23" fill="#ffffff">stewarded the reference client as</text>
<text x="500" y="642" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="23" fill="#ffffff">lead maintainer after Satoshi</text>
<text x="500" y="675" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="23" fill="#ffffff">stepped away.</text>

  <line x1="242" y1="710" x2="758" y2="710" stroke="#2746b8" stroke-width="1" opacity="0.7"/>
<text x="500" y="734" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-style="italic" font-size="21" fill="#cdd9ff">“Bitcoin is designed to bring us</text>
<text x="500" y="763" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-style="italic" font-size="21" fill="#cdd9ff">back to a decentralized currency</text>
<text x="500" y="792" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-style="italic" font-size="21" fill="#cdd9ff">of the people.”</text>
<text x="500" y="827" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-style="italic" font-size="16" fill="#6ea0ff">— Forbes, 2011</text>


  <!-- footer: price + collector line -->
  <rect x="202" y="872" width="596" height="56" rx="8"
        fill="url(#btn)" stroke="#5a86ff" stroke-width="1"/>
  <text x="218" y="909" font-family="DejaVu Sans, sans-serif"
        font-weight="bold" font-size="28" fill="#ffffff"
        filter="url(#glow)">1,000 sats</text>
  <text x="782" y="908" text-anchor="end"
        font-family="DejaVu Sans Mono, monospace" font-size="16"
        fill="#cfdcff">ARGUS · 2/3</text>

  <!-- strength badge (overlaps the top-left card corner) -->
  <circle cx="238" cy="108" r="40" fill="url(#badge)"
          stroke="#5a86ff" stroke-width="2.5" filter="url(#glow)"/>
  <text x="238" y="122" text-anchor="middle"
        font-family="DejaVu Sans, sans-serif" font-weight="bold"
        font-size="40" fill="#ffffff">7</text>
</svg>
