<!DOCTYPE html>
<html lang="en" data-theme="{{ current_theme }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Bitcoin Argus{% endblock %}</title>
  <link rel="stylesheet" href="{{ theme_css }}">
  {% block head_extra %}{% endblock %}
</head>
<body class="theme-{{ current_theme }}">
  <header class="topbar">
    <a class="brand" href="/">▚ Bitcoin&nbsp;Argus</a>
    <nav class="theme-selector" aria-label="Theme selector">
      <span class="theme-label">theme:</span>
      {% for t in theme_links %}
        <a class="theme-option{% if t.active %} active{% endif %}"
           href="{{ t.url }}">{{ t.name }}</a>
      {% endfor %}
    </nav>
  </header>

  <div class="warning" role="alert">{{ warning_html|safe }}
    <span class="warning-policy">By using these services you agree to our
    <a href="/tos">Acceptable Use Policy</a> and
    <a href="/privacy">Privacy Policy</a>.</span>
  </div>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  {% include "footer.html" %}

  <script>
    // Click a 🧅 onion icon to copy its onion URL to the clipboard.
    document.addEventListener("click", function (e) {
      var el = e.target.closest(".onion-copy");
      if (!el) return;
      var url = el.dataset.onion;
      var done = function () {
        var prev = el.getAttribute("aria-label");
        el.classList.add("copied");
        el.setAttribute("aria-label", "copied!");
        setTimeout(function () {
          el.classList.remove("copied");
          el.setAttribute("aria-label", prev);
        }, 1200);
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(done, function () {});
      }
    });
  </script>
</body>
</html>
