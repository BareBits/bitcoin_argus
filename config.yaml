# Bitcoin Argus — deployment configuration.
#
# One hostname is shared by every network; services are reached on different
# ports. Each network gets a 1000-port block (regtest=30000, testnet3=31000,
# testnet4=32000, signet=33000, mutinynet=34000, custom-signet-short=35000,
# custom-signet-long=36000). Run `argus ports` to see the full allocation, and
# `argus validate` to check it.

global:
  hostname: myfaucet.com          # shared by ALL networks (services differ by port)
  ssl_enabled: true               # master switch — set false for local/test runs
  acme_email: ops@example.com     # required when ssl_enabled and a public SSL service exists
  # Container images (verify the tags exist for your arch before deploying):
  # bitcoind_image: lncm/bitcoind:v28.0
  # REQUIRED for mutinynet — a signetblocktime-capable bitcoind. No public
  # image exists; build one from MutinyWallet/mutiny-net or Bitcoin Knots:
  # bitcoind_knots_image: your-registry/bitcoind-signetblocktime:latest
  # The cashu.me web wallet is built from source (no official image); this pins
  # the git ref (commit SHA or tag) the build clones. Bump to update the wallet.
  # cashu_wallet_ref: adc4e107e961ad2567bc8cac1b7a987352ffc259
  # CashuPayServer is built from the BareBits fork (no published image); pin the
  # git ref it clones. The WooCommerce storefront uses the official images, with
  # WooCommerce + the BTCPay plugin installed at provision time (empty => latest).
  # cashupayserver_ref: main
  # wordpress_image: wordpress:7.0.0-php8.3-apache   # WooCommerce needs WP >= 6.9
  # wordpress_cli_image: wordpress:cli-php8.3
  # woocommerce_version: ""           # e.g. "9.4.2" to pin; empty => latest
  # btcpay_woocommerce_version: ""    # e.g. "4.4.0" to pin; empty => latest
  resources:                        # disk/RAM tuning (also settable per-network)
    profile: medium                 # low | medium | high (baseline knob values)
    log_rotation: true              # cap Docker json-file logs (10m x 3)
    # Explicit overrides of the profile's values (any subset):
    # bitcoind_dbcache: 300         # MiB     bitcoind_maxmempool: 100   # MB
    # fulcrum_db_mem: 600           # MiB     fulcrum_db_max_open_files: 200
    # mempool_mariadb_buffer_mb: 128
  # Tor: expose the WHOLE installation behind a single v3 onion address. Routing
  # is by port — each sub-tool answers on the same port it uses on clearnet, just
  # on the onion host. Operator-only ports (Core RPC, LND gRPC/REST) stay private.
  # The LND nodes advertise this onion so peers can reach them over Tor. On the
  # two-node (mined) networks the roles split: the primary (argus1) is clearnet-
  # only outbound (reliable; cannot dial .onion peers), while the secondary
  # (argus2) runs in Tor mode and CAN open channels out to .onion peers. Both
  # nodes accept inbound channels from anyone, Tor or clearnet. See README "Tor".
  tor:
    enabled: false                # opt-in; set true to stand up the onion
    # image: lncm/tor:0.4.7.13    # tor container image (override for your arch)
    # expose_web: true            # mempool / cashu / bitcart frontends + dashboard
    # expose_electrum: true       # public Fulcrum Electrum ports
    # expose_lnd_p2p: true        # LND P2P over the onion (both nodes reachable
    #                             # inbound; only argus2 dials out over Tor)
    # expose_bitcoind_p2p: true   # bitcoind P2P (only where already public)

# The dashboard: a web server (fronted by the shared Caddy) that welcomes
# visitors and reports live, per-service resource usage. It serves at the site
# root (https://<hostname>/) by default. Live disk/RAM figures are read through a
# read-only Docker-API proxy and cached for an hour.
web:
  enabled: true                   # set false to skip generating generated/web/
  ssl: true                       # follows global.ssl_enabled too
  # port:                         # default 443 (ssl) / 80 — set to serve on another port
  default_theme: hacker           # one of the keys in `themes` below
  themes:                         # name -> CSS path served under the app's /static/
    hacker: themes/hacker.css
    game: themes/game.css
    bootstrap: themes/bootstrap.css
  repo_url: https://github.com/BareBits/bitcoin_argus   # footer "run your own" link
  operator_name: BareBits                                # footer "Hosted by <name>"
  operator_url: https://getbarebits.com                  # link for the operator name
  contact_email: sales@getbarebits.com                   # shown on the /contact page
  # LNURL-pay / Lightning Address. When on, the dashboard answers
  # fees@/cashout@/donate@/referral@<hostname> (plus per-network <name>-<net>@
  # variants) and mints invoices on each network's primary LND node. The
  # cashout/fees/referral addresses are wired into each network's Bitcart
  # liquidity-helper plugin. Clearnet Lightning Addresses need ssl_enabled (the
  # paying wallet resolves them over https); the onion forms work over http.
  lnurl:
    enabled: true
    # default_network:              # backs the bare addresses; default = first enabled
    min_sat: 1
    max_sat: 5000000               # 0.05 BTC — valueless testnet coins, so generous
    comment_length: 255            # LUD-12; keep > 0 so the plugin's attribution sticks

networks:
  # --- enabled by default ---------------------------------------------------
  regtest:
    enabled: true
    miner:
      enabled: true
      block_interval_seconds: 60  # one new block per minute
      initial_blocks: 101         # coinbase maturity before steady state
    reset:
      # Auto-reset when the chain outgrows the cap. Defaults on for the mined
      # networks (regtest + custom-signet). When bitcoind's on-disk size reaches
      # max_size_gb the whole network is torn down and re-deployed to base config
      # (all coins, Lightning channels, transactions, and tool state are wiped).
      enabled: true
      max_size_gb: 30             # cap on bitcoind size_on_disk (GiB)
      # check_interval_seconds: 300  # how often the controller polls the size
    mempool:
      enabled: true               # no public explorer exists for regtest
    bitcart:
      admin_email: admin@example.com               # set to a real address
      liquidity:
        # Optional: an explicit cash-out Lightning Address overrides the auto-
        # wired cashout-<net>@<hostname> LNURL address. Omit it (when web.lnurl is
        # on with ssl_enabled) to cash out to this network's own LND node #1.
        cashout_lightning_address: pay@example.com
        # referral_fee_amount: 0.0   # hosting/referral fee on top of the dev fee;
                                      # paid to referral-<net>@<hostname> (needs web.lnurl)

  # --- scaffolded but disabled (flip `enabled: true` to use) ----------------
  signet:
    enabled: false                # public signet, off by default (no challenge needed)
    mempool:
      enabled: false              # mempool.space hosts a public signet explorer
    bitcart:
      admin_email: admin@example.com
      liquidity:
        cashout_lightning_address: pay@example.com

  testnet3:
    enabled: false                # mempool.space hosts a public testnet3 explorer

  testnet4:
    enabled: false                # mempool.space hosts a public testnet4 explorer

  mutinynet:
    enabled: false                # custom signet, 30s blocks
    # signet_challenge + seed node are built in; mempool defaults on.
    # Requires global.bitcoind_knots_image (signetblocktime-capable bitcoind).

  # Two self-mined custom signets ship on by default. They are independent chains
  # (each gets its OWN auto-generated challenge + signing key) and differ only in
  # how often they auto-reset on a size cap:
  #   * short-lived — resets every 30 GB (like regtest); small and disposable.
  #   * long-lived  — resets every 300 GB; persists for long-running tests.
  custom-signet-short:
    enabled: true                 # self-mined custom signet, on by default
    # signet_challenge: leave unset — Argus auto-generates a matched challenge +
    # block-signing key into secrets/custom-signet-short/. Set it only to bring
    # your own (in which case you also run your own signer).
    miner:
      enabled: true               # Argus signs + mines blocks for this signet
      block_interval_seconds: 60  # one signed block per minute
    reset:
      enabled: true               # auto-reset on size cap (keeps the signet's
      max_size_gb: 30             # challenge/key — resets to genesis as the
                                  # SAME custom signet, just wiped to base config)
    bitcart:
      admin_email: admin@example.com
      liquidity:
        cashout_lightning_address: pay@example.com

  custom-signet-long:
    enabled: true                 # self-mined, long-lived custom signet
    # signet_challenge: leave unset — Argus auto-generates a matched challenge +
    # block-signing key into secrets/custom-signet-long/ (independent of the
    # short-lived signet's key, so these are two separate chains).
    miner:
      enabled: true               # Argus signs + mines blocks for this signet
      block_interval_seconds: 60  # one signed block per minute
    reset:
      enabled: true               # auto-reset on size cap; this network defaults
      # max_size_gb: 300          # to 300 GB (left unset = the long-lived default;
                                  # uncomment to raise/lower the threshold).
    bitcart:
      admin_email: admin@example.com
      liquidity:
        cashout_lightning_address: pay@example.com

# Per-network options available (all optional; sane defaults applied):
#   prune: <MiB>                  # rejected if an indexer/mempool is enabled
#   bitcoind: { extra_args: [...], p2p_public: true }
#               # p2p_public (default true): publish + firewall the node's P2P
#               # port so peers can connect. Set false to keep it loopback-only
#               # (e.g. to stop strangers reorging a trivial-difficulty regtest).
#   lnd:      { name, color, extra_args: [...], extra_env: {...}, auto_compact,
#               advertise_external_ip: true, wumbo, min_chan_size,
#               secondary: { enabled, name: argus2, color },
#               tertiary:  { enabled, name: argus3, color },
#               channels:  { enabled, funding, fund_btc: 25, channel_btc: 10,
#                            rebalancer: { enabled, interval_seconds: 300,
#                                          low_ratio: 0.35, high_ratio: 0.65,
#                                          max_fee_sat: 1000 } } }
#               # THREE LND nodes (argus1/2/3) are deployed by default on every
#               # network and wired into a "liquidity ring" — argus1->argus2->
#               # argus3->argus1 — so each node can keep both inbound AND outbound
#               # liquidity by rebalancing OFF-CHAIN around the ring (no Loop/Boltz,
#               # works on every testnet). Each node is funded fund_btc on-chain and
#               # opens one channel_btc channel to the next hop; an initial circular
#               # rebalance brings every channel to ~50/50.
#               # funding: 'auto' mines+funds (mineable nets); 'external' waits for
#               # coins you send to each node's address (the operator dashboard shows
#               # the deposit addresses). Default: auto on mineable+miner, else
#               # external. rebalancer keeps channels in the low/high ratio band.
#               # name/color set each node's gossip alias (<=32 bytes) + color.
#               # advertise_external_ip publishes <hostname>:<p2p> so peers find us.
#               # Set channels.enabled false (or secondary/tertiary.enabled false)
#               # to opt out of the ring on a given network.
#               # NOTE: on regtest the bitcoind P2P (mining) port stays CLOSED
#               # until channel setup completes, then bitcoind reopens it
#               # automatically — keeping funding safe from adversarial reorgs.
#   cashu:    { enabled, ssl, wallet, extra_env: {...} }
#             wallet (default true): also deploy a co-located cashu.me web wallet
#             pointed at this network's mint (set false to skip it).
#   fedimint: { enabled, guardians, federation_name,
#               gateway: { float_btc, extra_env }, extra_env: {...} }
#               # A Fedimint federation (Chaumian ecash with M-of-N guardian
#               # custody) + a Lightning gateway per ring node, deployed ALONGSIDE
#               # this network's Cashu mint. On by default. guardians (1..3,
#               # default 1) = number of fedimintd guardians; one gatewayd is paired
#               # with each ring LND node (gateway i -> argus_i), so guardians is
#               # capped by the number of ring nodes enabled. Guardians share this
#               # network's bitcoind (a chain view + broadcaster — it holds no
#               # keys). The federation is created by an automated, non-interactive
#               # DKG at first deploy; a Fedi-style wallet joins via the invite code
#               # (guardian + gateway APIs are fronted publicly by the shared Caddy).
#               # The federation rides the liquidity ring's self-rebalancing
#               # channels for Lightning, so it needs no extra liquidity machinery
#               # even on networks Argus can't mine. gateway.float_btc (default 0.5)
#               # is the ecash float pegged into the federation per gateway, funded
#               # like the ring: mined on auto-funded nets, an operator/faucet
#               # deposit (to the surfaced peg-in address) on external-funded ones.
#               # guardian/gateway passwords are auto-generated to secrets/<net>/.
#               # NOTE: Fedimint is auto-disabled (with a generation-time warning)
#               # on any network whose chain it cannot run on. Every chain Argus
#               # ships today is supported (the custom signets + mutinynet run as
#               # "signet"), so nothing is excluded; a future/unsupported chain
#               # would degrade loudly instead of generating a broken stack.
#   bitcart:  { enabled, ssl, branch, admin_email, btclnd_debug,
#               btclnd_p2p_pool_size,
#               liquidity: { disabled, automatic_channel_creation,
#                            cashout_lightning_address, log_level },
#               smtp: { server, port, tls, ssl, username, from_email },
#               ports: { store, admin, api, daemon }, extra_env: {...} }
#               # bitcart admin password is auto-generated to secrets/<net>/;
#               # SMTP password: add BITCART_SMTP_PASSWORD to secrets/<net>/secrets.env
#   cashupayserver: { enabled, ssl, admin_email, submarine_swaps, extra_env: {...} }
#               # BTCPay-compatible gateway backed by this network's Cashu mint.
#               # On by default. Built from source (global.cashupayserver_ref);
#               # admin password auto-generated to secrets/<net>/; admin_email
#               # falls back to bitcart.admin_email. submarine_swaps default false.
#   woocommerce: { enabled, ssl, admin_email, admin_user, store_name, extra_env }
#               # WordPress/WooCommerce storefront (its own MariaDB) selling the
#               # demo cards via the BTCPay plugin pointed at this net's
#               # CashuPayServer (requires it). On by default; guest checkout on,
#               # registration off, currency BTC. admin password auto-generated;
#               # admin_user default "argus-admin"; admin_email falls back to bitcart.
#   indexers: [ { name, enabled, ssl } ]    # one Fulcrum per entry
#   mempool:  { enabled, ssl, statistics, lightning }  # statistics default true
#             (biggest DB grower; set false to save disk); lightning default true
#             (indexes the local LND graph)
#   reset:    { enabled, max_size_gb, check_interval_seconds }     # mined nets only
#             # auto tear-down + re-deploy to base config when the chain's
#             # size_on_disk reaches max_size_gb. enabled defaults on for regtest
#             # and the custom signets, off elsewhere (rejected if set there).
#             # max_size_gb defaults per network when unset: 30 for regtest and the
#             # short-lived signet, 300 for the long-lived signet.
#   resources: { profile, log_rotation, bitcoind_dbcache, bitcoind_maxmempool,
#                fulcrum_db_mem, fulcrum_db_max_open_files,
#                mempool_mariadb_buffer_mb }  # per-network override of global
#   ports:    { <port_name>: <number> }     # override any allocated port
